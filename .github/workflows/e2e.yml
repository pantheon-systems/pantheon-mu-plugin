name: E2E

on:
  workflow_dispatch:
  push:
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Playwright E2E (Pantheon multidev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e
    env:
      TERMINUS_SITE: pantheon-mu-plugin
      TERMINUS_SOURCE_ENV: dev
      TERMINUS_HIDE_UPDATE_MESSAGE: '1'
      WP_USER: ${{ secrets.E2E_WP_USER }}
      WP_PASSWORD: ${{ secrets.E2E_WP_PASSWORD }}
      HEADLESS: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP (for Terminus)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Terminus
        run: |
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar -o /tmp/terminus
          chmod +x /tmp/terminus
          sudo mv /tmp/terminus /usr/local/bin/terminus
          terminus --version

      - name: Authenticate Terminus
        run: terminus auth:login --machine-token="${{ secrets.TERMINUS_TOKEN }}"

      - name: Configure SSH for Pantheon (git/SFTP)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PANTHEON_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results (screenshots, videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/e2e/test-results/
          retention-days: 7
